apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-alpha
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /tmp/pv-alpha
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-beta
spec:
  capacity:
    storage: 2Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /tmp/pv-beta
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-gamma
spec:
  capacity:
    storage: 3Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /tmp/pv-gamma
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sc-retain
provisioner: retain-provisioner
reclaimPolicy: Retain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-alpha
  namespace: team-alpha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deploy-alpha
  template:
    metadata:
      labels:
        app: deploy-alpha
    spec:
      containers:
      - name: nginx
        image: nginx:1.17.3-alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-beta
  namespace: team-beta
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy-beta
  template:
    metadata:
      labels:
        app: deploy-beta
    spec:
      containers:
      - name: httpd
        image: httpd:2.4-alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-gamma
  namespace: team-gamma
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deploy-gamma
  template:
    metadata:
      labels:
        app: deploy-gamma
    spec:
      containers:
      - name: busybox
        image: busybox:1.31.0
        command: ["sleep", "1d"]
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-delta
  namespace: team-delta
spec:
  containers:
  - name: busybox
    image: busybox:1.31.0
    command: ["sleep", "1d"]
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-epsilon
  namespace: team-epsilon
spec:
  containers:
  - name: nginx
    image: nginx:1.17.3-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-zeta
  namespace: team-zeta
spec:
  containers:
  - name: httpd
    image: httpd:2.4-alpine
---
apiVersion: v1
kind: Service
metadata:
  name: svc-eta
  namespace: team-eta
spec:
  selector:
    app: svc-eta
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: svc-theta
  namespace: team-theta
spec:
  selector:
    app: svc-theta
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
